<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Poker Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- LOBBY -->
    <div id="lobby">
      <h1>🃏 Poker Game</h1>
      <p>Enter your name to join the table</p>
      <input type="text" id="nameInput" placeholder="Your name..." maxlength="20" />
      <button id="joinBtn">Join Game</button>
      <div id="playerList">
        <h3>Players in lobby:</h3>
        <ul id="players"></ul>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="hidden">

      <div id="topBar">
        <span id="roundLabel">Pre-Game</span>
        <div id="topBarRight">
          <span id="potLabel">Pot: 0</span>
          <div id="blindTimerDisplay">
            <span class="blind-current">Blinds: 25/50</span>
            <span class="blind-next">Loading...</span>
          </div>
        </div>
      </div>

      <div id="tableContainer">
        <div id="table">
          <div id="communityCards">
            <div class="community-card empty"></div>
            <div class="community-card empty"></div>
            <div class="community-card empty"></div>
            <div class="community-card empty"></div>
            <div class="community-card empty"></div>
          </div>
          <div id="seats"></div>
        </div>
      </div>

      <div id="bottomBar">
        <div id="myCards">
          <div class="my-card empty"></div>
          <div class="my-card empty"></div>
        </div>
        <div id="actionButtons" class="hidden">
          <div id="raiseSliderContainer">
            <div id="raiseAmountDisplay">Raise: 0</div>
            <input type="range" id="raiseSlider" min="50" max="5000" value="50" step="10" />
            <div id="sliderLabels">
              <span id="sliderMin">Min: 50</span>
              <span id="sliderMax">Max: 5,000</span>
            </div>
          </div>
          <div id="actionBtns">
            <button id="foldBtn"  class="action-btn fold">Fold</button>
            <button id="checkBtn" class="action-btn check">Check</button>
            <button id="callBtn"  class="action-btn call">Call</button>
            <button id="raiseBtn" class="action-btn raise">Raise</button>
            <button id="allInBtn" class="action-btn allin">All In</button>
          </div>
        </div>
      </div>

      <div id="gameLog">
        <div id="gameLogTitle">Game Log</div>
        <ul id="gameLogList"></ul>
      </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
  </body>
</html>
